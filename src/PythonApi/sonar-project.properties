# SonarQube Configuration — Python API (FastAPI)
sonar.projectKey=ssdlc-demo-pythonapi
sonar.projectName=SSDLC Demo - Python API
sonar.projectVersion=1.0

sonar.sources=app
sonar.tests=../../tests/PythonApi.Tests
sonar.language=py

# Coverage report from pytest
sonar.python.coverage.reportPaths=**/python-coverage.xml
sonar.python.xunit.reportPath=**/python-results.xml

# Exclusions
sonar.exclusions=**/__pycache__/**,**/Dockerfile
sonar.coverage.exclusions=**/conftest.py,**/test_*.py
