# SonarQube Configuration — Container App (.NET 8)
sonar.projectKey=ssdlc-demo-containerapp
sonar.projectName=SSDLC Demo - Container App
sonar.projectVersion=1.0

sonar.sources=.
sonar.tests=../../tests/ContainerApp.Tests
sonar.language=cs

# Coverage report from dotnet test
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/test-results.trx

# Exclusions
sonar.exclusions=**/bin/**,**/obj/**,**/Dockerfile
sonar.coverage.exclusions=**/Program.cs
