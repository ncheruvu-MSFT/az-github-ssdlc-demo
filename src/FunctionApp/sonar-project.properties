# SonarQube Configuration — Function App (.NET 8 Isolated Worker)
sonar.projectKey=ssdlc-demo-functionapp
sonar.projectName=SSDLC Demo - Function App
sonar.projectVersion=1.0

sonar.sources=.
sonar.tests=../../tests/FunctionApp.Tests
sonar.language=cs

# Coverage report from dotnet test
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/test-results.trx

# Exclusions
sonar.exclusions=**/bin/**,**/obj/**,**/local.settings.json,**/host.json
sonar.coverage.exclusions=**/Program.cs
