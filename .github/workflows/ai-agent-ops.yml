# ==============================================================================
# AI Agent Ops — Create, Evaluate & Red Team AI Agents
# Triggers on push to AI Agent scripts or manual dispatch
# SSDLC: Agent quality gates, safety evaluation, multi-env deployment
# ==============================================================================
name: AI Agent Ops - Evaluate & Red Team

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/AIAgent/**'
      - '.github/workflows/ai-agent-ops.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/AIAgent/**'
  workflow_dispatch:
  schedule:
    # Weekly red team security scan — Monday at 2 AM UTC
    - cron: '0 2 * * 1'

permissions:
  id-token: write      # OIDC for Azure login
  contents: read
  actions: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ── Build & Validate ──────────────────────────────────────────
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: src/AIAgent/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/AIAgent/requirements.txt
          pip install -r src/AIAgent/requirements-dev.txt

      - name: Validate Python syntax
        run: |
          python -m py_compile src/AIAgent/create_agent.py
          python -m py_compile src/AIAgent/run_agent.py
          python -m py_compile src/AIAgent/agent_eval.py
          python -m py_compile src/AIAgent/red_team.py
          python -m py_compile src/AIAgent/observability.py
          python -m py_compile src/AIAgent/checkimports.py
          python -m py_compile src/AIAgent/agenteval_classic.py
          python -m py_compile src/AIAgent/content_safety.py
          python -m py_compile src/AIAgent/redteam_classic.py
          python -m py_compile src/AIAgent/e2etest.py
          python -m py_compile src/AIAgent/policy_validation.py
          python -m py_compile src/AIAgent/tool_schema_validation.py
          python -m py_compile src/AIAgent/gate_logic.py
          echo "All Python files compiled successfully"

      - name: Check module imports
        run: python src/AIAgent/checkimports.py

      - name: Run unit tests
        run: |
          cd src/AIAgent
          python -m pytest ../../tests/AIAgent.Tests/ \
            --tb=short \
            --junitxml=../../test-results/ai-agent-tests.xml \
            -v || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-agent-test-results
          path: test-results/
          retention-days: 30

      - name: Upload agent scripts
        uses: actions/upload-artifact@v4
        with:
          name: agent-scripts
          path: |
            src/AIAgent/create_agent.py
            src/AIAgent/run_agent.py
            src/AIAgent/agent_eval.py
            src/AIAgent/red_team.py
            src/AIAgent/observability.py
            src/AIAgent/redteam_classic.py
            src/AIAgent/e2etest.py
            src/AIAgent/gate_logic.py
            src/AIAgent/requirements.txt
          retention-days: 30

  # ── DEV — Create & Test Agent ─────────────────────────────────
  deploy-dev:
    name: Deploy Agent to Dev
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: dev
      url: https://ai.azure.com/build/agents

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-scripts
          path: src/AIAgent

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: src/AIAgent/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/AIAgent/requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Agent in Dev
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT_DEV }}
          FOUNDRY_MODEL_NAME: ${{ secrets.FOUNDRY_MODEL_NAME }}
          AGENT_NAME: ssdlc-demo-agent
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}
        run: |
          echo "Deploying agent to DEV environment..."
          cd src/AIAgent
          python create_agent.py
          echo "Dev agent deployment completed"

      - name: Test Agent in Dev
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT_DEV }}
          FOUNDRY_MODEL_NAME: ${{ secrets.FOUNDRY_MODEL_NAME }}
          AGENT_NAME: ssdlc-demo-agent
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}
        run: |
          echo "Testing existing agent in DEV..."
          cd src/AIAgent
          python run_agent.py
          echo "Dev agent test completed"
        continue-on-error: true

  # ── TEST — Evaluate & Red Team ────────────────────────────────
  evaluate-test:
    name: Evaluate Agent Quality
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: staging
      url: https://ai.azure.com/build/agents

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-scripts
          path: src/AIAgent

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: src/AIAgent/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/AIAgent/requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Agent Evaluation
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT_TEST }}
          FOUNDRY_MODEL_NAME: ${{ secrets.FOUNDRY_MODEL_NAME }}
        run: |
          echo "Running agent evaluation in TEST environment..."
          echo "Metrics: Task Completion, Task Adherence, Intent Resolution"
          echo "         Groundedness, Relevance, Tool Call Accuracy"
          cd src/AIAgent
          python agent_eval.py
          echo "Evaluation completed"
        continue-on-error: true

  red-team-test:
    name: Red Team Security Testing
    runs-on: ubuntu-latest
    needs: evaluate-test
    environment:
      name: staging
      url: https://ai.azure.com/build/agents

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-scripts
          path: src/AIAgent

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: src/AIAgent/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/AIAgent/requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Red Team Security Testing
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT_TEST }}
          FOUNDRY_MODEL_NAME: ${{ secrets.FOUNDRY_MODEL_NAME }}
          AGENT_NAME: ssdlc-demo-agent
        run: |
          echo "Running red team security testing..."
          echo "Risk categories: Violence, HateUnfairness, Sexual, SelfHarm"
          echo "                 ProhibitedActions, SensitiveDataLeakage"
          echo "Attack strategies: Flip, Base64"
          cd src/AIAgent
          python red_team.py
          echo "Red team testing completed"
        continue-on-error: true
        timeout-minutes: 45

      - name: Run Extended Red Team (Classic Attacks)
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT_TEST }}
          FOUNDRY_MODEL_NAME: ${{ secrets.FOUNDRY_MODEL_NAME }}
          AGENT_NAME: ssdlc-demo-agent
        run: |
          echo "Running extended adversarial tests..."
          echo "Categories: jailbreak, role_confusion, multi_turn, indirect_injection"
          cd src/AIAgent
          python redteam_classic.py
        continue-on-error: true
        timeout-minutes: 30

      - name: E2E Agent Smoke Test
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT_TEST }}
          FOUNDRY_MODEL_NAME: ${{ secrets.FOUNDRY_MODEL_NAME }}
          AGENT_NAME: ssdlc-demo-agent
        run: |
          cd src/AIAgent
          python e2etest.py
        continue-on-error: true
        timeout-minutes: 15

      - name: Safety Gate Check
        run: |
          cd src/AIAgent
          python gate_logic.py safety
        continue-on-error: true

      - name: Upload Red Team Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: redteam-results
          path: src/AIAgent/data_folder/
          retention-days: 90

      - name: Check Red Team Results
        if: always()
        run: |
          if ls src/AIAgent/data_folder/redteam_results_*.json 2>/dev/null; then
            echo "Red team results generated successfully"
            for f in src/AIAgent/data_folder/redteam_results_*.json; do
              echo "File: $f ($(du -h "$f" | cut -f1))"
            done
            echo "Review artifacts for detailed security findings"
          else
            echo "No red team results files found"
          fi

  # ── PRODUCTION — Verify Agent ─────────────────────────────────
  verify-prod:
    name: Verify Production Agent
    runs-on: ubuntu-latest
    needs: red-team-test
    environment:
      name: production
      url: https://ai.azure.com/build/agents

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-scripts
          path: src/AIAgent

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: src/AIAgent/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/AIAgent/requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Verify Production Agent
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT_PROD }}
          FOUNDRY_MODEL_NAME: ${{ secrets.FOUNDRY_MODEL_NAME }}
          AGENT_NAME: ssdlc-demo-agent
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING_PROD }}
        run: |
          echo "Verifying production agent..."
          cd src/AIAgent
          python run_agent.py
          echo "Production agent verification completed"

      - name: AI Ops Summary
        run: |
          echo "=============================================="
          echo "AI AGENT OPS — PIPELINE COMPLETE"
          echo "=============================================="
          echo "Completed at: $(date)"
          echo "Environments: Dev -> Staging (Eval + Red Team) -> Production"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run Number: ${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "Agent creation & deployment completed"
          echo "Evaluation metrics recorded"
          echo "Security red team testing performed"
          echo "Production verification completed"
          echo ""
          echo "Review artifacts for detailed results"
