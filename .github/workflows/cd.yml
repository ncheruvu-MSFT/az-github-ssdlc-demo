# ==============================================================================
# CD Pipeline — Deploy to Azure (dev → staging → prod)
# Triggers on successful CI on main branch
# SSDLC: Environment approvals, OIDC auth, immutable artifacts
# ==============================================================================
name: CD - Deploy to Azure

on:
  workflow_run:
    workflows: ["CI - Build & Test"]
    branches: [main]
    types: [completed]

permissions:
  id-token: write    # OIDC for Azure login
  contents: read
  packages: write    # Container image signing

env:
  DOTNET_VERSION: "8.0.x"
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ACR_NAME: ${{ secrets.ACR_NAME }}
  DEPLOY_REGION: "australiaeast"

jobs:
  # ── Build Artifacts ────────────────────────────────────────────
  build-artifacts:
    name: "Build Deployment Artifacts"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Function App publish
      - name: Publish Function App
        run: |
          dotnet publish src/FunctionApp/HelloWorld.Functions.csproj \
            -c Release \
            -o ./artifacts/functionapp

      - name: Upload Function App artifact
        uses: actions/upload-artifact@v4
        with:
          name: functionapp
          path: ./artifacts/functionapp

      # Container images
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Build & push C# Container App
        uses: docker/build-push-action@v6
        with:
          context: src/ContainerApp
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/containerapp:${{ github.sha }}

      - name: Build & push Python API
        uses: docker/build-push-action@v6
        with:
          context: src/PythonApi
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/pythonapi:${{ github.sha }}

      # ── Container Image Signing with Notation (Notary v2) ──
      - name: Install Notation CLI
        uses: notaryproject/notation-action/setup@v1
        with:
          version: "1.2.0"

      - name: Generate signing key (self-signed for demo)
        run: |
          notation cert generate-test "ssdlc-demo-signing-key"
          echo "Notation signing key generated for demo purposes"

      - name: Sign Container App image
        run: |
          notation sign \
            ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/containerapp:${{ github.sha }} \
            --key "ssdlc-demo-signing-key"
          echo "✅ Container App image signed"

      - name: Sign Python API image
        run: |
          notation sign \
            ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/pythonapi:${{ github.sha }} \
            --key "ssdlc-demo-signing-key"
          echo "✅ Python API image signed"

      - name: Export trust policy for verification
        run: |
          # Create trust policy for downstream verification
          mkdir -p ./notation-config
          cat > ./notation-config/trustpolicy.json << EOF
          {
            "version": "1.0",
            "trustPolicies": [
              {
                "name": "ssdlc-containerapp",
                "registryScopes": [ "${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/containerapp" ],
                "signatureVerification": {
                  "level": "strict"
                },
                "trustStores": [ "ca:ssdlc-demo-signing-key" ],
                "trustedIdentities": [ "*" ]
              },
              {
                "name": "ssdlc-pythonapi",
                "registryScopes": [ "${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/pythonapi" ],
                "signatureVerification": {
                  "level": "strict"
                },
                "trustStores": [ "ca:ssdlc-demo-signing-key" ],
                "trustedIdentities": [ "*" ]
              }
            ]
          }
          EOF
          # Copy certs for downstream jobs
          cp -r ~/.config/notation ./notation-config/notation-home || true
          echo "Trust policy created"

      - name: Upload signing artifacts
        uses: actions/upload-artifact@v4
        with:
          name: notation-config
          path: ./notation-config
          retention-days: 1

  # ── Deploy to Dev ──────────────────────────────────────────────
  deploy-dev:
    name: "Deploy to Dev"
    needs: build-artifacts
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # ── Verify container signatures before deploy ──
      - name: Install Notation CLI
        uses: notaryproject/notation-action/setup@v1
        with:
          version: "1.2.0"

      - name: Download signing config
        uses: actions/download-artifact@v4
        with:
          name: notation-config
          path: ./notation-config

      - name: Restore Notation trust store
        run: |
          mkdir -p ~/.config/notation
          cp -r ./notation-config/notation-home/* ~/.config/notation/ || true
          cp ./notation-config/trustpolicy.json ~/.config/notation/trustpolicy.json

      - name: Verify Container App image signature
        run: |
          notation verify \
            ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/containerapp:${{ github.sha }}
          echo "✅ Container App image signature verified"

      - name: Verify Python API image signature
        run: |
          notation verify \
            ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/pythonapi:${{ github.sha }}
          echo "✅ Python API image signature verified"

      # Deploy Infrastructure
      - name: Deploy Bicep (dev)
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: ${{ env.DEPLOY_REGION }}
          template: infra/main.bicep
          parameters: >-
            infra/main.dev.bicepparam
            containerImage=${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/containerapp:${{ github.sha }}
            pythonApiImage=${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/pythonapi:${{ github.sha }}
            acrName=${{ env.ACR_NAME }}
          deploymentName: "deploy-dev-${{ github.run_number }}"

      # Deploy Function App
      - name: Download Function App artifact
        uses: actions/download-artifact@v4
        with:
          name: functionapp
          path: ./artifacts/functionapp

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: "func-ssdlcdemo-dev"
          package: "./artifacts/functionapp"

      # Update Container App images
      - name: Update Container App image
        run: |
          az containerapp update \
            --name ca-hello-ssdlcdemo-dev \
            --resource-group rg-ssdlcdemo-dev \
            --image ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/containerapp:${{ github.sha }}

      - name: Update Python API image
        run: |
          az containerapp update \
            --name ca-pyapi-ssdlcdemo-dev \
            --resource-group rg-ssdlcdemo-dev \
            --image ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/pythonapi:${{ github.sha }}

      # Smoke test
      - name: Smoke test (dev)
        run: |
          echo "Waiting for deployment to stabilize..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://func-ssdlcdemo-dev.azurewebsites.net/api/health 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then echo "Health check passed!"; exit 0; fi
            sleep 10
          done
          echo "::warning::Health check did not return 200 within timeout — deployment may still be starting"

  # ── Deploy to Staging ──────────────────────────────────────────
  deploy-staging:
    name: "Deploy to Staging"
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # ── Verify container signatures before deploy ──
      - name: Install Notation CLI
        uses: notaryproject/notation-action/setup@v1
        with:
          version: "1.2.0"

      - name: Download signing config
        uses: actions/download-artifact@v4
        with:
          name: notation-config
          path: ./notation-config

      - name: Restore Notation trust store
        run: |
          mkdir -p ~/.config/notation
          cp -r ./notation-config/notation-home/* ~/.config/notation/ || true
          cp ./notation-config/trustpolicy.json ~/.config/notation/trustpolicy.json

      - name: Verify Container App image signature
        run: |
          notation verify \
            ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/containerapp:${{ github.sha }}
          echo "✅ Container App image signature verified"

      - name: Verify Python API image signature
        run: |
          notation verify \
            ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/pythonapi:${{ github.sha }}
          echo "✅ Python API image signature verified"

      - name: Deploy Bicep (staging)
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: ${{ env.DEPLOY_REGION }}
          template: infra/main.bicep
          parameters: >-
            infra/main.staging.bicepparam
            containerImage=${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/containerapp:${{ github.sha }}
            pythonApiImage=${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/pythonapi:${{ github.sha }}
            acrName=${{ env.ACR_NAME }}
          deploymentName: "deploy-staging-${{ github.run_number }}"

      - name: Download Function App artifact
        uses: actions/download-artifact@v4
        with:
          name: functionapp
          path: ./artifacts/functionapp

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: "func-ssdlcdemo-staging"
          package: "./artifacts/functionapp"

      - name: Update Container App image
        run: |
          az containerapp update \
            --name ca-hello-ssdlcdemo-staging \
            --resource-group rg-ssdlcdemo-staging \
            --image ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/containerapp:${{ github.sha }}

      - name: Update Python API image
        run: |
          az containerapp update \
            --name ca-pyapi-ssdlcdemo-staging \
            --resource-group rg-ssdlcdemo-staging \
            --image ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/pythonapi:${{ github.sha }}

      - name: Smoke test (staging)
        run: |
          echo "Waiting for staging deployment to stabilize..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://func-ssdlcdemo-staging.azurewebsites.net/api/health 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then echo "Health check passed!"; exit 0; fi
            sleep 10
          done
          echo "::warning::Staging health check did not return 200 within timeout"

  # ── Deploy to Production ───────────────────────────────────────
  deploy-prod:
    name: "Deploy to Production"
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production     # Requires manual approval
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # ── Verify container signatures before deploy (mandatory for prod) ──
      - name: Install Notation CLI
        uses: notaryproject/notation-action/setup@v1
        with:
          version: "1.2.0"

      - name: Download signing config
        uses: actions/download-artifact@v4
        with:
          name: notation-config
          path: ./notation-config

      - name: Restore Notation trust store
        run: |
          mkdir -p ~/.config/notation
          cp -r ./notation-config/notation-home/* ~/.config/notation/ || true
          cp ./notation-config/trustpolicy.json ~/.config/notation/trustpolicy.json

      - name: Verify Container App image signature
        run: |
          notation verify \
            ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/containerapp:${{ github.sha }}
          echo "✅ Container App image signature verified — PRODUCTION"

      - name: Verify Python API image signature
        run: |
          notation verify \
            ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/pythonapi:${{ github.sha }}
          echo "✅ Python API image signature verified — PRODUCTION"

      - name: Deploy Bicep (prod)
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: ${{ env.DEPLOY_REGION }}
          template: infra/main.bicep
          parameters: >-
            infra/main.prod.bicepparam
            containerImage=${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/containerapp:${{ github.sha }}
            pythonApiImage=${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/pythonapi:${{ github.sha }}
            acrName=${{ env.ACR_NAME }}
          deploymentName: "deploy-prod-${{ github.run_number }}"

      - name: Download Function App artifact
        uses: actions/download-artifact@v4
        with:
          name: functionapp
          path: ./artifacts/functionapp

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: "func-ssdlcdemo-prod"
          package: "./artifacts/functionapp"

      - name: Update Container App image
        run: |
          az containerapp update \
            --name ca-hello-ssdlcdemo-prod \
            --resource-group rg-ssdlcdemo-prod \
            --image ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/containerapp:${{ github.sha }}

      - name: Update Python API image
        run: |
          az containerapp update \
            --name ca-pyapi-ssdlcdemo-prod \
            --resource-group rg-ssdlcdemo-prod \
            --image ${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/pythonapi:${{ github.sha }}

      - name: Smoke test (prod)
        run: |
          echo "Waiting for production deployment to stabilize..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://func-ssdlcdemo-prod.azurewebsites.net/api/health 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then echo "Production health check passed!"; exit 0; fi
            sleep 10
          done
          echo "::warning::Production health check did not return 200 within timeout"

  # ── Teams Notifications ──────────────────────────────────────
  notify-teams:
    name: "Notify Teams"
    needs: [deploy-dev, deploy-staging, deploy-prod]
    if: always() && vars.TEAMS_WEBHOOK_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: Determine deployment status
        id: status
        run: |
          DEV="${{ needs.deploy-dev.result }}"
          STAGING="${{ needs.deploy-staging.result }}"
          PROD="${{ needs.deploy-prod.result }}"

          if [ "$PROD" = "success" ]; then
            echo "summary=✅ Production deployment complete" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          elif [ "$STAGING" = "success" ]; then
            echo "summary=⏸️ Staging deployed — awaiting production approval" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          elif [ "$DEV" = "success" ]; then
            echo "summary=🔧 Dev deployed — staging pending" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          else
            echo "summary=❌ Deployment failed" >> $GITHUB_OUTPUT
            echo "color=attention" >> $GITHUB_OUTPUT
          fi

          echo "dev=$DEV" >> $GITHUB_OUTPUT
          echo "staging=$STAGING" >> $GITHUB_OUTPUT
          echo "prod=$PROD" >> $GITHUB_OUTPUT

      - name: Send Teams notification
        env:
          TEAMS_WEBHOOK_URL: ${{ vars.TEAMS_WEBHOOK_URL }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          cat > teams-payload.json << 'TEAMS_EOF'
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {
                      "type": "TextBlock",
                      "size": "Large",
                      "weight": "Bolder",
                      "text": "SSDLC Demo — Deployment Update"
                    },
                    {
                      "type": "TextBlock",
                      "text": "SUMMARY_PLACEHOLDER",
                      "wrap": true
                    },
                    {
                      "type": "FactSet",
                      "facts": [
                        { "title": "Commit", "value": "SHA_PLACEHOLDER" },
                        { "title": "Dev", "value": "DEV_PLACEHOLDER" },
                        { "title": "Staging", "value": "STAGING_PLACEHOLDER" },
                        { "title": "Production", "value": "PROD_PLACEHOLDER" }
                      ]
                    }
                  ],
                  "actions": [
                    {
                      "type": "Action.OpenUrl",
                      "title": "View Workflow Run",
                      "url": "URL_PLACEHOLDER"
                    }
                  ]
                }
              }
            ]
          }
          TEAMS_EOF

          # Replace placeholders
          sed -i "s|SUMMARY_PLACEHOLDER|${{ steps.status.outputs.summary }}|g" teams-payload.json
          sed -i "s|SHA_PLACEHOLDER|$SHORT_SHA|g" teams-payload.json
          sed -i "s|DEV_PLACEHOLDER|${{ steps.status.outputs.dev }}|g" teams-payload.json
          sed -i "s|STAGING_PLACEHOLDER|${{ steps.status.outputs.staging }}|g" teams-payload.json
          sed -i "s|PROD_PLACEHOLDER|${{ steps.status.outputs.prod }}|g" teams-payload.json
          sed -i "s|URL_PLACEHOLDER|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|g" teams-payload.json

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d @teams-payload.json \
            "$TEAMS_WEBHOOK_URL"
          echo "✅ Teams notification sent"
