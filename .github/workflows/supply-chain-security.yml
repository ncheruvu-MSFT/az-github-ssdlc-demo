# ==============================================================================
# Supply Chain Security — Container Image Dependency Updates & Patching
# GitHub equivalent of ADO Dependabot + Copacetic pipeline
# SSDLC: Keeps container base images updated, patches OS-level CVEs
# Ref: https://learn.microsoft.com/en-us/azure/security/container-secure-supply-chain/articles/container-secure-supply-chain-implementation/cssc-depenadabot
# ==============================================================================
name: Supply Chain Security - Container Patching

on:
  schedule:
    - cron: "0 7 * * 1-5"   # Weekdays 7 AM UTC
  workflow_dispatch:
    inputs:
      patch_only:
        description: "Only patch existing images (skip rebuild)"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  packages: write
  security-events: write
  pull-requests: write

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  # ── Scan container images for OS-level vulnerabilities ─────────
  scan-images:
    name: "Scan Container Images (Trivy)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: containerapp
            context: src/ContainerApp
            dockerfile: src/ContainerApp/Dockerfile
          - name: pythonapi
            context: src/PythonApi
            dockerfile: src/PythonApi/Dockerfile
          - name: webapp
            context: src/WebApp
            dockerfile: src/WebApp/Dockerfile
    outputs:
      containerapp-vulns: ${{ steps.scan-containerapp.outputs.has_vulns }}
      pythonapi-vulns: ${{ steps.scan-pythonapi.outputs.has_vulns }}
      webapp-vulns: ${{ steps.scan-webapp.outputs.has_vulns }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t ssdlc-${{ matrix.name }}:scan -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Run Trivy vulnerability scanner
        id: scan-${{ matrix.name }}
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "ssdlc-${{ matrix.name }}:scan"
          format: "sarif"
          output: "trivy-${{ matrix.name }}.sarif"
          severity: "CRITICAL,HIGH"
          vuln-type: "os"

      - name: Check for vulnerabilities
        id: check
        run: |
          VULN_COUNT=$(cat trivy-${{ matrix.name }}.sarif | jq '[.runs[].results[]] | length')
          echo "vulnerability_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          if [ "$VULN_COUNT" -gt "0" ]; then
            echo "has_vulns=true" >> $GITHUB_OUTPUT
            echo "::warning::Found $VULN_COUNT OS vulnerabilities in ${{ matrix.name }}"
          else
            echo "has_vulns=false" >> $GITHUB_OUTPUT
            echo "No OS vulnerabilities found in ${{ matrix.name }}"
          fi

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: "container-${{ matrix.name }}"

      - name: Export Trivy JSON report (for Copa)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "ssdlc-${{ matrix.name }}:scan"
          format: "json"
          output: "trivy-${{ matrix.name }}.json"
          severity: "CRITICAL,HIGH"
          vuln-type: "os"

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.name }}
          path: trivy-${{ matrix.name }}.json

  # ── Patch container images using Copacetic (Copa) ──────────────
  patch-images:
    name: "Patch Images (Copacetic)"
    runs-on: ubuntu-latest
    needs: scan-images
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: containerapp
            context: src/ContainerApp
            dockerfile: src/ContainerApp/Dockerfile
          - name: pythonapi
            context: src/PythonApi
            dockerfile: src/PythonApi/Dockerfile
          - name: webapp
            context: src/WebApp
            dockerfile: src/WebApp/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Trivy report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report-${{ matrix.name }}

      - name: Build image for patching
        run: docker build -t ssdlc-${{ matrix.name }}:unpatched -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Install Copa CLI
        run: |
          COPA_VERSION="0.9.0"
          curl -Lo copa.tar.gz "https://github.com/project-copacetic/copacetic/releases/download/v${COPA_VERSION}/copa_${COPA_VERSION}_linux_amd64.tar.gz"
          tar xzf copa.tar.gz -C /usr/local/bin/ copa
          chmod +x /usr/local/bin/copa
          copa --version

      - name: Setup Buildkit
        run: |
          docker run --detach --rm --privileged \
            -p 127.0.0.1:8888:8888/tcp \
            --name buildkitd \
            --entrypoint buildkitd \
            moby/buildkit:latest --addr tcp://0.0.0.0:8888

      - name: Patch image with Copa
        id: copa-patch
        run: |
          echo "Patching ssdlc-${{ matrix.name }} with Copa..."
          copa patch \
            --image "ssdlc-${{ matrix.name }}:unpatched" \
            --report "trivy-${{ matrix.name }}.json" \
            --patched-tag "patched" \
            --addr tcp://127.0.0.1:8888 \
            --timeout 10m || {
              echo "Copa patching completed with warnings (some packages may not be patchable)"
              echo "patched=partial" >> $GITHUB_OUTPUT
              exit 0
            }
          echo "patched=true" >> $GITHUB_OUTPUT

      - name: Verify patched image
        if: steps.copa-patch.outputs.patched == 'true'
        run: |
          echo "Rescanning patched image..."
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity CRITICAL,HIGH \
            --vuln-type os \
            "ssdlc-${{ matrix.name }}:patched"

      - name: Cleanup Buildkit
        if: always()
        run: docker stop buildkitd 2>/dev/null || true

  # ── Push patched images to ACR ─────────────────────────────────
  push-patched:
    name: "Push Patched Images to ACR"
    runs-on: ubuntu-latest
    needs: patch-images
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: containerapp
            context: src/ContainerApp
            dockerfile: src/ContainerApp/Dockerfile
          - name: pythonapi
            context: src/PythonApi
            dockerfile: src/PythonApi/Dockerfile
          - name: webapp
            context: src/WebApp
            dockerfile: src/WebApp/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build image
        run: docker build -t ssdlc-${{ matrix.name }}:unpatched -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Download Trivy report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report-${{ matrix.name }}

      - name: Install Copa & Buildkit
        run: |
          COPA_VERSION="0.9.0"
          curl -Lo copa.tar.gz "https://github.com/project-copacetic/copacetic/releases/download/v${COPA_VERSION}/copa_${COPA_VERSION}_linux_amd64.tar.gz"
          tar xzf copa.tar.gz -C /usr/local/bin/ copa
          chmod +x /usr/local/bin/copa
          docker run --detach --rm --privileged \
            -p 127.0.0.1:8888:8888/tcp \
            --name buildkitd \
            --entrypoint buildkitd \
            moby/buildkit:latest --addr tcp://0.0.0.0:8888

      - name: Patch and push to ACR
        run: |
          IMAGE_TAG="${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/${{ matrix.name }}:patched-$(date +%Y%m%d)"

          copa patch \
            --image "ssdlc-${{ matrix.name }}:unpatched" \
            --report "trivy-${{ matrix.name }}.json" \
            --patched-tag "acr-push" \
            --addr tcp://127.0.0.1:8888 \
            --timeout 10m || true

          docker tag "ssdlc-${{ matrix.name }}:acr-push" "$IMAGE_TAG" 2>/dev/null || \
            docker tag "ssdlc-${{ matrix.name }}:unpatched" "$IMAGE_TAG"

          docker push "$IMAGE_TAG"
          echo "Pushed: $IMAGE_TAG"

      - name: Sign patched image with Notation
        run: |
          # Install Notation
          curl -Lo notation.tar.gz "https://github.com/notaryproject/notation/releases/download/v1.2.0/notation_1.2.0_linux_amd64.tar.gz"
          tar xzf notation.tar.gz -C /usr/local/bin/ notation
          chmod +x /usr/local/bin/notation
          notation cert generate-test "ssdlc-supply-chain"

          IMAGE_TAG="${{ env.ACR_NAME }}.azurecr.io/ssdlcdemo/${{ matrix.name }}:patched-$(date +%Y%m%d)"
          notation sign "$IMAGE_TAG" --key "ssdlc-supply-chain" || echo "Signing skipped (key store not configured)"

      - name: Cleanup
        if: always()
        run: docker stop buildkitd 2>/dev/null || true

  # ── SBOM Generation ────────────────────────────────────────────
  generate-sbom:
    name: "Generate SBOM"
    runs-on: ubuntu-latest
    needs: scan-images
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: containerapp
            context: src/ContainerApp
            dockerfile: src/ContainerApp/Dockerfile
          - name: pythonapi
            context: src/PythonApi
            dockerfile: src/PythonApi/Dockerfile
          - name: webapp
            context: src/WebApp
            dockerfile: src/WebApp/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for SBOM
        run: docker build -t ssdlc-${{ matrix.name }}:sbom -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: "ssdlc-${{ matrix.name }}:sbom"
          format: spdx-json
          output-file: "sbom-${{ matrix.name }}.spdx.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: "sbom-${{ matrix.name }}.spdx.json"
