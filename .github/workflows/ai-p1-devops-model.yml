# ==============================================================================
# P1 DevOps Model — Prompt Evaluation & Content Safety Pipeline
# Ref: Image Row 1 — Trigger → Build & Validate → Prompt Evaluation →
#                     Content Safety → Quality Gate → Deploy App + Model → Monitor
# NOTE: Generic security (CodeQL, Bandit, Trivy, Dependabot) handled by ci.yml
#       This workflow covers AI-SPECIFIC prompt eval + content safety only
# ==============================================================================
name: 'P1: DevOps Model — Prompt Eval & Content Safety'

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/AIAgent/**'
      - '.github/workflows/ai-p1-devops-model.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/AIAgent/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read
  security-events: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ── Build & Validate ──────────────────────────────────────────
  build-validate:
    name: 'Build & Validate'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: src/AIAgent/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/AIAgent/requirements.txt
          pip install -r src/AIAgent/requirements-dev.txt

      - name: Check imports
        run: python src/AIAgent/checkimports.py

      - name: Ruff lint
        run: |
          pip install ruff
          ruff check src/AIAgent/ --output-format=github

      - name: gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        run: |
          cd src/AIAgent
          python -m pytest ../../tests/AIAgent.Tests/ \
            --tb=short \
            --junitxml=../../test-results/p1-tests.xml \
            -v || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: p1-test-results
          path: test-results/
          retention-days: 30

      - name: Upload agent scripts
        uses: actions/upload-artifact@v4
        with:
          name: p1-agent-scripts
          path: src/AIAgent/
          retention-days: 7

  # ── Prompt Evaluation (AI-powered) ────────────────────────────
  prompt-evaluation:
    name: 'Prompt Evaluation'
    runs-on: ubuntu-latest
    needs: build-validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: p1-agent-scripts
          path: src/AIAgent

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r src/AIAgent/requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Prompt Regression Evaluation
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT_DEV }}
          FOUNDRY_MODEL_NAME: ${{ secrets.FOUNDRY_MODEL_NAME }}
          AGENT_NAME: ssdlc-demo-agent
        run: |
          echo "Running prompt regression tests..."
          echo "Metrics: Coherence, Relevance, Fluency, Groundedness"
          cd src/AIAgent
          python agenteval_classic.py
        timeout-minutes: 20

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: p1-eval-results
          path: src/AIAgent/data_folder/
          retention-days: 30

  # ── Content Safety (AI-powered) ───────────────────────────────
  content-safety:
    name: 'Content Safety'
    runs-on: ubuntu-latest
    needs: prompt-evaluation
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: p1-agent-scripts
          path: src/AIAgent

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r src/AIAgent/requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Content filter validation
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT_DEV }}
          FOUNDRY_MODEL_NAME: ${{ secrets.FOUNDRY_MODEL_NAME }}
        run: |
          echo "Running content safety evaluation..."
          echo "Categories: Violence, Sexual, SelfHarm, HateUnfairness, ProtectedMaterial"
          cd src/AIAgent
          python content_safety.py
        timeout-minutes: 20

      - name: pip-audit OWASP dependency check
        run: |
          pip install pip-audit
          pip-audit -r src/AIAgent/requirements.txt --desc || true

      - name: Upload safety results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: p1-safety-results
          path: src/AIAgent/data_folder/
          retention-days: 30

  # ── Quality Gate ──────────────────────────────────────────────
  quality-gate:
    name: 'Quality Gate'
    runs-on: ubuntu-latest
    needs: content-safety
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: p1-agent-scripts
          path: src/AIAgent

      - name: Download eval results
        uses: actions/download-artifact@v4
        with:
          name: p1-eval-results
          path: src/AIAgent/data_folder
        continue-on-error: true

      - name: Download safety results
        uses: actions/download-artifact@v4
        with:
          name: p1-safety-results
          path: src/AIAgent/data_folder
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Quality Gate
        run: |
          cd src/AIAgent
          python gate_logic.py quality

      - name: Gate Summary
        if: always()
        run: |
          echo "### P1 Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Prompt Evaluation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Content Safety | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gate | ✅ |" >> $GITHUB_STEP_SUMMARY

  # ── Deploy App + Model (push to main only) ────────────────────
  deploy:
    name: 'Deploy App + Model'
    runs-on: ubuntu-latest
    needs: quality-gate
    environment:
      name: dev
      url: https://ai.azure.com/build/agents
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: p1-agent-scripts
          path: src/AIAgent

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r src/AIAgent/requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wire model endpoint config
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT_DEV }}
          FOUNDRY_MODEL_NAME: ${{ secrets.FOUNDRY_MODEL_NAME }}
          AGENT_NAME: ssdlc-demo-agent
        run: |
          echo "Deploying agent..."
          cd src/AIAgent
          python create_agent.py
          echo "Agent deployed to dev"

      - name: Smoke test live endpoint
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT_DEV }}
          FOUNDRY_MODEL_NAME: ${{ secrets.FOUNDRY_MODEL_NAME }}
          AGENT_NAME: ssdlc-demo-agent
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}
        run: |
          cd src/AIAgent
          python e2etest.py
        continue-on-error: true
        timeout-minutes: 10
