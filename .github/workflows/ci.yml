# ==============================================================================
# CI Pipeline — Build, Test, Security Scan
# Triggers on every PR and push to main/develop
# SSDLC: SAST, dependency scanning, container scanning, code coverage
# ==============================================================================
name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  pull-requests: write
  checks: write

env:
  DOTNET_VERSION: "8.0.x"
  PYTHON_VERSION: "3.12"

jobs:
  # ── .NET Build & Test ──────────────────────────────────────────
  dotnet-build-test:
    name: ".NET Build & Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SsdlcDemo.sln

      - name: Build
        run: dotnet build SsdlcDemo.sln --configuration Release --no-restore --warnaserror

      - name: Run tests with coverage
        run: |
          dotnet test SsdlcDemo.sln \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-test-results
          path: ./TestResults

      - name: Publish .NET Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: ".NET Test Results"
          path: "TestResults/**/*.trx"
          reporter: dotnet-trx
          fail-on-error: true

      - name: Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: github.event_name == 'pull_request'
        with:
          filename: "TestResults/**/coverage.cobertura.xml"
          badge: true
          format: markdown
          output: both
          thresholds: "60 80"

      - name: Post Coverage to PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  # ── Python Build & Test ────────────────────────────────────────
  python-build-test:
    name: "Python Build & Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/PythonApi/requirements.txt
          pip install -r src/PythonApi/requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check src/PythonApi/

      - name: Run tests with coverage
        run: |
          cd tests/PythonApi.Tests
          pytest \
            --cov=../../src/PythonApi/app \
            --cov-report=xml:../../TestResults/python-coverage.xml \
            --cov-report=term-missing \
            --junitxml=../../TestResults/python-results.xml \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-results
          path: ./TestResults

      - name: Publish Python Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Python Test Results"
          path: "TestResults/python-results.xml"
          reporter: java-junit
          fail-on-error: true

  # ── SSDLC Security Scanning ───────────────────────────────────
  security-scan:
    name: "Security Scanning (SSDLC)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── .NET SAST with Security Code Scan ──
      - name: .NET Security Audit
        run: |
          dotnet restore SsdlcDemo.sln
          dotnet list src/FunctionApp/HelloWorld.Functions.csproj package --vulnerable --include-transitive
          dotnet list src/ContainerApp/HelloWorld.ContainerApp.csproj package --vulnerable --include-transitive
          dotnet list src/WebApp/SsdlcDemo.WebApp.csproj package --vulnerable --include-transitive

      # ── Python SAST with Bandit ──
      - name: Install Python security tools
        run: pip install bandit safety

      - name: Bandit SAST scan
        run: bandit -r src/PythonApi/app/ -f json -o bandit-report.json || true

      - name: Safety dependency check
        run: safety check -r src/PythonApi/requirements.txt --output json > safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

      # ── GitHub CodeQL Analysis ──
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp, python, javascript

      - name: Build for CodeQL
        run: dotnet build SsdlcDemo.sln --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp,/language:python,/language:javascript"

  # ── Container Image Scanning ───────────────────────────────────
  container-scan:
    name: "Container Image Scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: containerapp
            context: src/ContainerApp
            dockerfile: src/ContainerApp/Dockerfile
          - name: pythonapi
            context: src/PythonApi
            dockerfile: src/PythonApi/Dockerfile
          - name: webapp
            context: src/WebApp
            dockerfile: src/WebApp/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t ${{ matrix.name }}:scan -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Microsoft Defender for DevOps container scan
        uses: microsoft/security-devops-action@v1
        id: defender
        env:
          GDN_TRIVY_ACTION: image
          GDN_TRIVY_TARGET: ${{ matrix.name }}:scan
        with:
          tools: trivy
        continue-on-error: true

      - name: Upload scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.defender.outputs.sarifFile != ''
        with:
          sarif_file: ${{ steps.defender.outputs.sarifFile }}

  # ── Infrastructure Validation ──────────────────────────────────
  infra-validate:
    name: "Bicep Lint & Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bicep Lint
        run: az bicep lint --file infra/main.bicep

      - name: Bicep Build (compile check)
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

      - name: Run Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: bicep
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
